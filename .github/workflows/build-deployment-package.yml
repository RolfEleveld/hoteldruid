name: Build and Publish Deployment Package

on:
  push:
    branches:
      - blazor
  pull_request:
    branches:
      - blazor
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-deployment-package:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build script
        env:
          HOTELDRUID_BUILD_NUMBER: ${{ github.run_number }}
        run: ./scripts/build.ps1
        shell: pwsh

      - name: Collect deployment artifacts
        run: |
          New-Item -ItemType Directory -Path ./deployment-package -Force | Out-Null
          Copy-Item -Recurse -Force ./artifacts/* ./deployment-package/
          Copy-Item -Force ./scripts/deploy.ps1 ./deployment-package/
          Copy-Item -Force ./README.md ./deployment-package/
        shell: pwsh

      - name: Upload deployment package artifact
        uses: actions/upload-artifact@v4
        with:
          name: hoteldruid-deployment-package-${{ github.run_number }}
          path: deployment-package/
          retention-days: 14

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: hoteldruid-sbom-${{ github.run_number }}
          path: deployment-package/sbom/
          retention-days: 14

      - name: Build release archive
        if: github.event_name != 'pull_request'
        run: |
          Compress-Archive -Path ./deployment-package/* -DestinationPath ./hoteldruid-deployment-package.zip -Force
        shell: pwsh

      - name: Publish latest blazor release asset
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = 'blazor-latest'
          $title = 'Blazor Latest Deployment Package'
          $notes = "Automated deployment package from commit $env:GITHUB_SHA"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag ./hoteldruid-deployment-package.zip --clobber
            gh release upload $tag ./deployment-package/sbom/HotelDruid.Api.sbom.cdx.json --clobber
            gh release upload $tag ./deployment-package/sbom/HotelDruid.Client.sbom.cdx.json --clobber
            gh release edit $tag --title $title --notes $notes --target $env:GITHUB_SHA
          } else {
            gh release create $tag ./hoteldruid-deployment-package.zip ./deployment-package/sbom/HotelDruid.Api.sbom.cdx.json ./deployment-package/sbom/HotelDruid.Client.sbom.cdx.json --title $title --notes $notes --target $env:GITHUB_SHA
          }
        shell: pwsh
