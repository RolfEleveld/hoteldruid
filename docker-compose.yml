# HotelDruid — Blazor WASM + .NET API
# Run:  docker compose up --build
# Stop: docker compose down

services:
  api:
    build: .
    container_name: HotelDruid-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - HotelDruid_data:/data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      HotelDruid_DATAROOT: /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  HotelDruid_data:
    driver: local

