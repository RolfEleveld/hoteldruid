services:
  proxy:
    image: nginx:1.27-alpine
    container_name: hoteldroid-proxy
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/compose/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERT_PATH:-./deploy/certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_KEY_PATH:-./deploy/certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro
    restart: unless-stopped
